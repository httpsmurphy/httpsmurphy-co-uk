<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c10;
    --bg-soft: #11151c;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --accent: #ff8a2b;
    --accent-soft: #ff6a00;
    --green: #3fb950;
    --cyan: #58a6ff;
    --red: #f85149;
    --yellow: #f0c060;
    --mono: ui-monospace, "JetBrains Mono", "Fira Code", "SF Mono", Menlo, Consolas, monospace;
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  /* Faint CRT scanlines */
  body::after {
    content: "";
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 3px
    );
    pointer-events: none;
    z-index: 2;
    mix-blend-mode: overlay;
  }
  /* Subtle vignette */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* ---------- Terminal window ---------- */
  .term {
    max-width: 820px;
    margin: 0 auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 3;
  }
  .term-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #1a1f27;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .term-title {
    margin-left: auto;
    margin-right: auto;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
    padding-left: 32px; /* counteract the dot weight on the left */
  }

  /* ---------- Screen ---------- */
  .screen {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px 8px;
    font-size: 14px;
    line-height: 1.55;
    background:
      radial-gradient(ellipse 800px 400px at 50% 0%, rgba(255,138,43,0.06), transparent 70%),
      var(--bg);
    scroll-behavior: smooth;
    cursor: text;
    /* Custom scrollbar */
    scrollbar-width: thin;
    scrollbar-color: #2a2f3a transparent;
  }
  .screen::-webkit-scrollbar { width: 6px; }
  .screen::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 3px; }
  .screen::-webkit-scrollbar-track { background: transparent; }
  @media (max-width: 480px) {
    .screen { font-size: 13px; padding: 12px 14px 6px; }
  }

  .screen pre {
    font-family: var(--mono);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .line { display: block; min-height: 1.55em; }

  /* Prompt & syntax colors */
  .prompt { color: var(--accent); font-weight: 700; }
  .user   { color: var(--green); }
  .at     { color: var(--text-dim); }
  .host   { color: var(--cyan); }
  .path   { color: var(--yellow); }
  .ok     { color: var(--green); }
  .warn   { color: var(--yellow); }
  .err    { color: var(--red); }
  .dim    { color: var(--text-dim); }
  .accent { color: var(--accent); }
  .name   { color: var(--text); font-weight: 700; }
  .sub    { color: var(--text-dim); }
  .label  {
    display: inline-block;
    color: var(--accent);
    font-weight: 700;
    border-bottom: 1px solid rgba(255,138,43,0.3);
    padding-bottom: 1px;
    margin-bottom: 4px;
  }

  /* ASCII art header */
  .ascii {
    color: var(--accent);
    font-weight: 700;
    line-height: 1.05;
    font-size: 11px;
    text-shadow: 0 0 8px rgba(255,138,43,0.4);
    margin: 6px 0 10px;
    white-space: pre;
    overflow-x: auto;
  }
  @media (max-width: 480px) { .ascii { font-size: 8px; } }

  /* Service entry — tappable card-line */
  .svc {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    margin: 2px -8px;
    border-radius: 6px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease, opacity 0.35s ease;
    position: relative;
    opacity: 0;
    transform: translateY(4px);
  }
  .svc.in {
    opacity: 1;
    transform: translateY(0);
  }
  .label.fade {
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .label.fade.in { opacity: 1; }
  @media (prefers-reduced-motion: reduce) {
    .svc { opacity: 1; transform: none; }
    .label.fade { opacity: 1; }
  }
  .svc:hover, .svc:focus-visible {
    background: rgba(255,138,43,0.08);
    outline: none;
  }
  .svc:active { transform: scale(0.98); }
  .svc::before {
    content: "▸ ";
    color: var(--accent);
    flex-shrink: 0;
    font-weight: 700;
    margin-right: 2px;
  }
  .svc:hover::before { content: "▶ "; }
  .svc-icon {
    width: 18px; height: 18px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
  }
  .svc-name { color: var(--text); font-weight: 600; }
  .svc-url { color: var(--text-dim); font-size: 12px; margin-left: auto; }
  @media (max-width: 480px) { .svc-url { display: none; } }

  /* Blinking cursor */
  .cursor {
    display: inline-block;
    width: 8px;
    height: 1em;
    background: var(--accent);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1.05s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---------- Input bar at the bottom ---------- */
  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    background: var(--bg);
    flex-shrink: 0;
  }
  @media (max-width: 480px) { .input-row { padding: 8px 14px 12px; } }
  .input-row .ip {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    caret-color: var(--accent);
    padding: 4px 0;
  }
  @media (max-width: 480px) { .input-row .ip { font-size: 13px; } }
  .input-row .ip::placeholder { color: var(--text-dim); font-style: italic; opacity: 0.7; }
  .hint {
    font-size: 11px;
    color: var(--text-dim);
    padding: 0 18px 8px;
    text-align: center;
  }
  @media (max-width: 480px) { .hint { padding: 0 14px 6px; font-size: 10px; } }
  .key {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 3px;
    background: rgba(255,255,255,0.04);
    font-size: 10px;
    color: var(--text);
    margin: 0 2px;
  }

  /* Skip intro hint */
  .skip-hint {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,138,43,0.4);
    color: var(--accent);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 11px;
    z-index: 4;
    cursor: pointer;
    transition: opacity 0.3s ease;
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
  }
  .skip-hint.hide { opacity: 0; pointer-events: none; }
</style>
</head>

<body>
<div class="term" id="term">
  <div class="term-bar">
    <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
    <span class="term-title">murphy@httpsmurphy:~</span>
  </div>
  <div class="screen" id="screen" tabindex="0"></div>
  <div class="hint">
    type <span class="key">help</span> · or tap any service to open · <span class="key">clear</span> resets
  </div>
  <form class="input-row" id="form" autocomplete="off">
    <span class="prompt">$</span>
    <input class="ip" id="cmd" type="text" placeholder="type a command..." spellcheck="false" autocapitalize="none" autocorrect="off" autocomplete="off">
  </form>
</div>

<div class="skip-hint" id="skip">tap to skip intro</div>

<script>
const screen = document.getElementById('screen');
const form = document.getElementById('form');
const input = document.getElementById('cmd');
const skip = document.getElementById('skip');

// --- service catalogue ---
const SERVICES = {
  aco: {
    label: 'ACO',
    items: [
      { id: 'murphaco', name: 'Murph ACO',         url: 'https://discord.gg/MvPV2FuJSg', icon: 'icons/murphaco.webp', short: 'discord.gg/MvPV2FuJSg' },
    ],
  },
  bots: {
    label: 'Bots',
    items: [
      { id: 'stellar',     name: 'Stellar AIO',   url: 'https://whop.com/stellaraio/stellaraio?a=bypass-link',         icon: 'icons/stellar.jpg',     short: 'whop.com/stellaraio' },
      { id: 'hidden',      name: 'Hidden AIO',    url: 'https://whop.com/hidden-society/hidden-society?a=bypass-link', icon: 'icons/hidden.jpg',      short: 'whop.com/hidden-society' },
      { id: 'brute',       name: 'Brute AIO',     url: 'https://whop.com/brute-aio/brute-aio?a=bypass-link',           icon: 'icons/brute.png',       short: 'whop.com/brute-aio' },
      { id: 'nikeshoebot', name: 'NikeShoeBot',   url: 'https://whop.com/nikeshoebot/nikeshoebot?a=bypass-link',       icon: 'icons/nikeshoebot.png', short: 'whop.com/nikeshoebot' },
    ],
  },
  cookgroups: {
    label: 'Cook Groups',
    items: [
      { id: 'resellers',  name: 'Resellers Paradise', url: 'https://whop.com/resellers-paradise-6/resellers-paradise-6?a=bypass-link', icon: 'icons/resellers.jpg',  short: 'whop.com/resellers-paradise' },
      { id: 'lunar',      name: 'Lunar FBA',          url: 'https://whop.com/lunarfba/lunar-fba?a=bypass-link',                         icon: 'icons/lunar.svg',      short: 'whop.com/lunarfba' },
      { id: 'hiddensoc',  name: 'Hidden Society',     url: 'https://whop.com/hidden-society/hidden-society?a=bypass-link',              icon: 'icons/hiddensoc.png',  short: 'whop.com/hidden-society' },
      { id: 'pokenotify', name: 'PokeNotify',         url: 'https://whop.com/pokenotify/pokenotify?a=bypass-link',                       icon: 'icons/pokenotify.png', short: 'whop.com/pokenotify' },
    ],
  },
  tools: {
    label: 'Tools / Proxies',
    items: [
      { id: 'hyonix',     name: 'Hyonix',             url: 'https://my.hyonix.com/aff.php?aff=5617',                  icon: 'icons/hyonix.png',     short: 'hyonix.com · HS-4+' },
      { id: 'immaculate', name: 'Immaculate Proxies', url: '#',                                                       icon: 'icons/immaculate.png', short: 'PKC ISPs + resis' },
      { id: 'icey',       name: 'Icey Proxies',       url: 'https://iceyproxies.xyz/?r=HTTPSMURPHY',                  icon: 'icons/icey.ico',       short: 'PKC ISPs + resis' },
      { id: 'onestop',    name: 'OneStop Proxies',    url: 'https://www.onestopproxies.com/register?ref=AUGRVK78',    icon: 'icons/onestop.ico',    short: 'premium resis' },
    ],
  },
};

// flat lookup for commands like `stellar` to open the service
const FLAT = {};
Object.values(SERVICES).forEach(cat => cat.items.forEach(it => { FLAT[it.id] = it; FLAT[it.name.toLowerCase().replace(/\s+/g,'')] = it; }));

// --- helpers ---
function append(html) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  screen.appendChild(div);
  screen.scrollTop = screen.scrollHeight;
  return div;
}
function appendPrompt(cmd) {
  append('<span class="user">murphy</span><span class="at">@</span><span class="host">httpsmurphy</span><span class="dim">:</span><span class="path">~</span><span class="prompt">$ </span>' + (cmd || ''));
}
function appendBlank() { append('&nbsp;'); }
function appendASCII() {
  const art =
`  ███╗   ███╗██╗   ██╗██████╗ ██████╗ ██╗  ██╗██╗   ██╗
  ████╗ ████║██║   ██║██╔══██╗██╔══██╗██║  ██║╚██╗ ██╔╝
  ██╔████╔██║██║   ██║██████╔╝██████╔╝███████║ ╚████╔╝
  ██║╚██╔╝██║██║   ██║██╔══██╗██╔═══╝ ██╔══██║  ╚██╔╝
  ██║ ╚═╝ ██║╚██████╔╝██║  ██║██║     ██║  ██║   ██║
  ╚═╝     ╚═╝ ╚═════╝ ╚═╝  ╚═╝╚═╝     ╚═╝  ╚═╝   ╚═╝`;
  const pre = document.createElement('pre');
  pre.className = 'ascii';
  pre.textContent = art;
  screen.appendChild(pre);
}
async function renderServiceList(cat) {
  // Only the tools/proxies section shows the right-side sub (descriptions).
  // ACO / Bots / Cook Groups are name-only.
  const showSub = (cat === SERVICES.tools);

  // Label fades in first
  const labelLine = document.createElement('div');
  labelLine.className = 'line';
  labelLine.innerHTML = '<span class="label fade">[' + cat.label + ']</span>';
  screen.appendChild(labelLine);
  screen.scrollTop = screen.scrollHeight;
  // next frame, kick the transition
  requestAnimationFrame(() => labelLine.querySelector('.label').classList.add('in'));
  if (!aborted) await sleep(120);

  // Each entry fades up with a stagger
  for (const it of cat.items) {
    const a = document.createElement('a');
    a.className = 'svc';
    a.href = it.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML =
      '<img class="svc-icon" src="' + it.icon + '" alt="" loading="lazy">' +
      '<span class="svc-name">' + it.name + '</span>' +
      (showSub ? '<span class="svc-url">' + it.short + '</span>' : '');
    if (it.url === '#') {
      a.addEventListener('click', e => {
        e.preventDefault();
        append('<span class="warn">[!] link tbc — coming soon</span>');
      });
    }
    screen.appendChild(a);
    screen.scrollTop = screen.scrollHeight;
    // kick the entry transition next frame
    requestAnimationFrame(() => a.classList.add('in'));
    if (!aborted) await sleep(90);
  }
  appendBlank();
  // small breath between sections
  if (!aborted) await sleep(180);
}

// --- typing engine ---
let aborted = false;
function abortBoot() { aborted = true; skip.classList.add('hide'); }
skip.addEventListener('click', abortBoot);
screen.addEventListener('click', e => {
  // tapping the screen during boot also skips
  if (!boot.done && e.target === screen) abortBoot();
});
input.addEventListener('focus', abortBoot);

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
async function type(html, cadence) {
  if (aborted) { append(html); return; }
  cadence = cadence || 18;
  const div = document.createElement('div');
  div.className = 'line';
  screen.appendChild(div);
  // strip-then-rebuild: type the visible chars, preserving inline HTML tags
  const parts = html.split(/(<[^>]+>)/g);
  for (const p of parts) {
    if (aborted) { div.innerHTML = html; break; }
    if (p.startsWith('<')) {
      div.innerHTML += p;
    } else {
      for (const ch of p) {
        if (aborted) { div.innerHTML = html; break; }
        div.innerHTML += ch;
        screen.scrollTop = screen.scrollHeight;
        await sleep(cadence + Math.random() * 10);
      }
    }
  }
  screen.scrollTop = screen.scrollHeight;
}

// --- boot sequence ---
const boot = { done: false };
async function runBoot() {
  await sleep(180);
  await type('<span class="dim">murphd v1.0 · ' + new Date().toISOString().split('T')[0] + '</span>', 8);
  await type('<span class="ok">[ ok ]</span> <span class="dim">connecting to httpsmurphy.co.uk...</span>', 10);
  await sleep(140);
  await type('<span class="ok">[ ok ]</span> <span class="dim">loading profile</span>', 10);
  await sleep(120);

  if (!aborted) appendBlank();
  appendASCII();
  if (!aborted) appendBlank();

  appendPrompt('whoami');
  await sleep(180);
  await type('<span class="accent">@httpsmurphy</span>  <span class="dim">·</span>  Murphy  <span class="dim">·</span>  <span class="dim">UK ACO owner</span>', 12);
  await type('<span class="dim">»</span> Best automated UK ACO for TCG, sneakers/apparel and collectables.', 10);
  await type('<span class="dim">»</span> Hundreds of clients · thousands of checkouts · £100k+ secured.', 10);
  appendBlank();

  appendPrompt('ls services/');
  await sleep(180);
  for (const cat of Object.values(SERVICES)) {
    await renderServiceList(cat);
  }
  appendBlank();

  appendPrompt('');
  // Final blinking cursor
  const last = screen.lastElementChild;
  last.innerHTML += '<span class="cursor"></span>';

  boot.done = true;
  skip.classList.add('hide');
  input.focus({ preventScroll: true });
}
runBoot();

// --- command handler ---
const COMMANDS = {
  help: () => {
    append('<span class="label">[commands]</span>');
    append('<span class="dim">  </span><span class="accent">aco</span><span class="dim">           open Murph ACO discord</span>');
    append('<span class="dim">  </span><span class="accent">bots</span><span class="dim">          list bots</span>');
    append('<span class="dim">  </span><span class="accent">cookgroups</span><span class="dim">    list cook groups</span>');
    append('<span class="dim">  </span><span class="accent">tools</span><span class="dim">         list tools / proxies</span>');
    append('<span class="dim">  </span><span class="accent">ls</span><span class="dim">            list everything</span>');
    append('<span class="dim">  </span><span class="accent">clear</span><span class="dim">         clear screen</span>');
    append('<span class="dim">  </span><span class="accent">whoami</span><span class="dim">        about me</span>');
    append('<span class="dim">  </span><span class="dim">or just type a service name (e.g. </span><span class="accent">stellar</span><span class="dim">) to open it</span>');
    appendBlank();
  },
  ls: async () => {
    for (const cat of Object.values(SERVICES)) await renderServiceList(cat);
  },
  clear: () => {
    // Replay the full boot sequence instead of just wiping
    screen.innerHTML = '';
    aborted = false;
    boot.done = false;
    skip.classList.remove('hide');
    runBoot();
  },
  whoami: () => {
    append('<span class="accent">@httpsmurphy</span>  <span class="dim">·</span>  Murphy  <span class="dim">·</span>  <span class="dim">UK ACO owner</span>');
    append('<span class="dim">»</span> Best automated UK ACO for TCG, sneakers/apparel and collectables.');
    append('<span class="dim">»</span> Hundreds of clients · thousands of checkouts · £100k+ secured.');
    appendBlank();
  },
  aco: () => { window.open('https://discord.gg/MvPV2FuJSg', '_blank', 'noopener'); append('<span class="ok">[ ok ]</span> <span class="dim">opening Murph ACO discord...</span>'); appendBlank(); },
  bots:        async () => await renderServiceList(SERVICES.bots),
  cookgroups:  async () => await renderServiceList(SERVICES.cookgroups),
  'cook-groups': async () => await renderServiceList(SERVICES.cookgroups),
  cookgroup:   async () => await renderServiceList(SERVICES.cookgroups),
  tools:       async () => await renderServiceList(SERVICES.tools),
  proxies:     async () => await renderServiceList(SERVICES.tools),
  // easter eggs
  'sudo': () => append('<span class="err">murphy is not in the sudoers file. this incident will be reported.</span>'),
  'rm -rf /': () => append('<span class="err">nice try.</span>'),
  'rm': () => append('<span class="err">nice try.</span>'),
  exit: () => append('<span class="dim">can\'t exit. you\'re here forever now.</span>'),
  date: () => append('<span class="dim">' + new Date().toString() + '</span>'),
  pwd: () => append('<span class="path">/home/murphy</span>'),
  echo: (args) => append(args.join(' ')),
  cat: (args) => {
    const f = (args[0] || '').toLowerCase();
    if (f === 'profile.txt' || f === 'profile') return COMMANDS.whoami();
    if (f === 'services.txt' || f === 'services') return COMMANDS.ls();
    append('<span class="err">cat: ' + (args[0] || '') + ': No such file</span>');
  },
};

function runCommand(raw) {
  appendPrompt(raw);
  const [cmd, ...args] = raw.trim().split(/\s+/);
  const lc = cmd.toLowerCase();
  if (!lc) { /* empty enter */ return; }
  // exact command
  if (COMMANDS[lc]) { COMMANDS[lc](args); return; }
  // raw rm -rf catch
  if (raw.trim().toLowerCase().startsWith('rm -rf')) { COMMANDS['rm -rf /'](); return; }
  // service shortcut
  if (FLAT[lc]) {
    const it = FLAT[lc];
    if (it.url === '#') { append('<span class="warn">[!] ' + it.name + ' link tbc — coming soon</span>'); return; }
    window.open(it.url, '_blank', 'noopener');
    append('<span class="ok">[ ok ]</span> <span class="dim">opening ' + it.name + '...</span>');
    return;
  }
  append('<span class="err">command not found: ' + cmd + '</span> <span class="dim">— try </span><span class="accent">help</span>');
}

form.addEventListener('submit', e => {
  e.preventDefault();
  const val = input.value;
  input.value = '';
  if (!val.trim()) { appendPrompt(''); return; }
  runCommand(val);
});

// History (up/down)
const history = [];
let histIdx = -1;
input.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') {
    if (histIdx < history.length - 1) { histIdx++; input.value = history[history.length - 1 - histIdx]; }
    e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    if (histIdx > 0) { histIdx--; input.value = history[history.length - 1 - histIdx]; }
    else { histIdx = -1; input.value = ''; }
    e.preventDefault();
  } else if (e.key === 'Enter' && input.value.trim()) {
    history.push(input.value);
    histIdx = -1;
  } else if (e.key === 'l' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    COMMANDS.clear();
  }
});

// Auto-hide skip hint after boot fully done (safety)
setTimeout(() => skip.classList.add('hide'), 6000);
</script>
</body>
</html>
